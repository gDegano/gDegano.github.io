<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV | Giulio Degano</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0a0a0f;
      font-family: 'Space Mono', monospace;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    nav {
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d0d14;
      border-bottom: 1px solid rgba(0, 255, 213, 0.2);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .back-link {
      color: #00ffd5;
      text-decoration: none;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .cv-container {
      flex-grow: 1;
      width: 100%;
      border: none;
    }

    /* ===== TOOLTIP (hover or tap) ===== */
    /* Usage: <span class="tip" tabindex="0">visible text<span class="tip-box">your note</span></span> */
    /* A link works inside the box: <span class="tip-box">see <a href="URL" target="_blank" rel="noopener">here</a></span> */
    .tip {
      position: relative;
      color: #00ffd5;
      border-bottom: 1px dashed rgba(0, 255, 213, 0.55);
      cursor: help;
      outline: none;
    }

    .tip-box {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      width: max-content;
      max-width: 260px;
      padding: 10px 14px;
      background: #14141e;
      border: 1px solid rgba(0, 255, 213, 0.3);
      border-radius: 4px;
      color: #e8e8e8;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: 0.02em;
      text-align: left;
      text-transform: none;
      white-space: normal;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.18s ease, visibility 0.18s ease;
      z-index: 100;
    }

    /* arrow */
    .tip-box::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #14141e;
    }

    /* invisible bridge: lets the cursor travel from the text into the box */
    .tip-box::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 12px;
    }

    .tip-box a {
      color: #00ffd5;
      text-decoration: underline;
    }

    .tip:hover .tip-box,
    .tip:focus-within .tip-box {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">GD</a>
    <a href="index.html" class="back-link">← Back to Hub</a>
  </nav>

  <iframe src="cv_GD.pdf" class="cv-container"></iframe>

</body>
</html>
